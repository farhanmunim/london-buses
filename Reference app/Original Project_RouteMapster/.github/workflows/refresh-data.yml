name: Refresh data

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TFL_APP_ID: ${{ secrets.TFL_APP_ID }}
      TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements-dev.txt

      - name: Fetch TfL bus route geometry
        run: python scripts/fetch_bus_routes.py

      - name: Process route geometry
        run: python scripts/process_routes_xml_to_geojson.py

      - name: Fetch bus stops
        run: python scripts/fetch_bus_stops.py

      - name: Build timetable frequency cache
        run: python scripts/build_frequency_cache.py

      - name: Fetch garages
        run: python scripts/fetch_and_process_garages.py --base data/garages-base.geojson

      - name: Fetch route destinations
        run: python scripts/fetch_route_destinations.py

      - name: Build route summary
        run: python scripts/build_route_summary.py

      # - name: Run tests
      #   run: pytest -q

      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail

          # Detect changes in exactly what we intend to commit
          changes=$(git status --porcelain -- data/processed data/raw/stops/postcode_cache.json)
          if [ -z "$changes" ]; then
            echo "No data changes."
            exit 0
          fi

          git config user.name "routemapster-bot"
          git config user.email "routemapster-bot@users.noreply.github.com"

          summary=$(python scripts/changes.py --summary)
          msg="Data update: $summary"

          python scripts/changes.py --details >> "$GITHUB_STEP_SUMMARY"

          git add data/processed
          git add -f data/raw/stops/postcode_cache.json
          git commit -m "$msg"
          git push
